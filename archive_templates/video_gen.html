{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video - AI for Bharat</title>
    <link rel="stylesheet" href="{% static 'css/common.css' %}?v=1.0.1">
    <link rel="stylesheet" href="{% static 'css/video_gen.css' %}?v=1.0.1">
</head>

<body>
    <nav>
        <div class="logo">AI for <span>Bharat</span></div>
        <div class="nav-links">
            <a href="{% url 'index' %}">Dashboard</a>
            <a href="{% url 'generate' %}">Generate</a>
            <a href="{% url 'video_gen' %}" class="active">AI Video</a>
            <a href="{% url 'history' %}">History</a>
            <a href="{% url 'scheduler' %}">Scheduler</a>
            <a href="javascript:void(0)" onclick="handleLogout()">Logout</a>
        </div>
    </nav>

    <div class="container" style="animation: fadeInUp 0.8s ease-out;">
        <div class="card">
            <h2>AI Video Generator</h2>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">
                Powered by BharatAI Simulation Engine
            </p>
            <form onsubmit="handleVideoGenerate(event)">
                <div class="form-group">
                    <label>Video Topic / Idea</label>
                    <textarea name="topic" rows="3"
                        placeholder="e.g. A futuristic robot drinking tea in a rainy park, cinematic lighting..."
                        required></textarea>
                </div>
                <button type="submit">Generate AI Video</button>
            </form>

            <div id="videoSection" class="video-container" style="animation: fadeInUp 0.5s ease-out;">
                <video id="videoPlayer" controls autoplay loop>
                    Your browser does not support the video tag.
                </video>
            </div>

            <div id="enhancedPromptSection"
                style="display: none; margin-top: 1.5rem; padding: 1rem; background: #f1f5f9; border-radius: 8px; animation: fadeInUp 0.5s ease-out;">
                <label style="font-size: 0.8rem;">Enhanced Prompt (via Groq):</label>
                <p id="enhancedPromptText" style="font-style: italic; color: var(--text-muted); font-size: 0.9rem;"></p>
            </div>
        </div>
    </div>
    <script src="{% static 'js/common.js' %}?v=1.0.1"></script>
    <script src="{% static 'js/video_gen.js' %}?v=1.0.1"></script>
</body>

</html>
