{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI for Bharat</title>
    <style>
        :root {
            --primary: #f59e0b;
            --bg-dark: #0f172a;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        .auth-form {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .auth-form input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.75rem;
            border-radius: 6px;
            width: 100%;
            margin-bottom: 1rem;
        }

        .auth-form input:focus {
            background: rgba(255, 255, 255, 0.15);
            outline: none;
            border-color: var(--primary);
        }

        .auth-form h2 {
            border-bottom: 2px solid var(--primary);
            display: inline-block;
            margin-bottom: 2rem;
        }

        button {
            background: var(--primary);
            color: black;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            margin-bottom: 0.25rem;
            color: var(--text-muted);
        }
    </style>
    <link rel="stylesheet" href="{% static 'css/common.css' %}?v=1.0.1">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}?v=1.0.1">
</head>

<body>
    <div class="container">
        <div class="card auth-form" style="animation: fadeInUp 0.8s ease-out; margin: 0; width: 100%;">
            <h1 class="logo" style="text-align: center; margin-bottom: 2rem; color: var(--primary);">AI for
                <span>Bharat</span>
            </h1>
            <h2 style="text-align: center;">Welcome Back</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit">Login</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem;">
                Don't have an account? <a href="{% url 'signup' %}" style="color: var(--primary);">Signup</a>
            </p>
        </div>
    </div>
    <script src="{% static 'js/common.js' %}?v=1.0.1"></script>
    <script src="{% static 'js/auth.js' %}?v=1.0.1"></script>
</body>

</html>
