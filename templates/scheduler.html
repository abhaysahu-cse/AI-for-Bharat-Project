{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduler - AI for Bharat</title>
    <link rel="stylesheet" href="{% static 'css/common.css' %}?v=1.0.1">
    <link rel="stylesheet" href="{% static 'css/scheduler.css' %}?v=1.0.1">
</head>

<body>
    <nav>
        <div class="logo">AI for <span>Bharat</span></div>
        <div class="nav-links">
            <a href="{% url 'index' %}">Dashboard</a>
            <a href="{% url 'generate' %}">Generate</a>
            <a href="{% url 'video_gen' %}">AI Video</a>
            <a href="{% url 'history' %}">History</a>
            <a href="{% url 'scheduler' %}" class="active">Scheduler</a>
            <a href="javascript:void(0)" onclick="handleLogout()">Logout</a>
        </div>
    </nav>

    <div class="container scheduler-container" style="animation: fadeInUp 0.8s ease-out;">
        <div class="card scheduler-card" style="max-width: 500px;">
            <h2>Schedule Content</h2>
            <div class="scheduler-info">
                <p style="color: var(--text-muted); margin-bottom: 0;">Scheduling for:</p>
                <strong id="contentTopicDisplay">Sample Topic</strong>
            </div>
            <form onsubmit="handleSchedule(event)">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" name="scheduled_date" required>
                </div>
                <div class="form-group">
                    <label>Time</label>
                    <input type="time" name="scheduled_time" required>
                </div>
                <button type="submit">Save Schedule</button>
            </form>
            <button class="btn-secondary" onclick="window.location.href='{% url 'history' %}'">Back to History</button>
        </div>
    </div>
    <script src="{% static 'js/common.js' %}?v=1.0.1"></script>
    <script src="{% static 'js/scheduler.js' %}?v=1.0.1"></script>
</body>

</html>
