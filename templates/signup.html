<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - AI for Bharat</title>
    <style>
        body {
            background-color: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .auth-form {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        .auth-form input {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .auth-form input:focus {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
    <link rel="stylesheet" href="style.css?v=1.0.1">
</head>

<body>
    <div class="container">
        <div class="card auth-form" style="animation: fadeInUp 0.8s ease-out; margin: 0; width: 100%;">
            <h1 class="logo" style="text-align: center; margin-bottom: 2rem; color: var(--primary);">AI for
                <span>Bharat</span>
            </h1>
            <h2>Create Account</h2>
            <form onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit">Signup</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem;">
                Already have an account? <a href="login.html" style="color: var(--primary);">Login</a>
            </p>
        </div>
    </div>
    <script src="main.js?v=1.0.1"></script>
</body>

</html>
